name: BookStore CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run All Tests (Unit, Integration, System) + Coverage Check
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout kode ──────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 11 ─────────────────────────────────────────
      - name: Setup Java 11 (JDK)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── 3. Setup PHP 8.2 ─────────────────────────────────────────
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json
          coverage: none

      # ── 4. Setup Chrome & ChromeDriver ────────────────────────────
      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 5. Verifikasi environment ─────────────────────────────────
      - name: Verify Environment
        run: |
          java -version
          php --version
          mvn -version

      # ── 6. Build Maven (compile) ──────────────────────────────────
      - name: Build with Maven (Compile)
        working-directory: backend
        run: mvn compile test-compile -B

      # ── 7. Jalankan Java Backend di background (port 8080) ────────
      - name: Start Java Backend Server (port 8080)
        working-directory: backend
        run: |
          mvn exec:java -Dexec.mainClass="backend.BookStoreServer" -Dexec.classpathScope=runtime -B &
          echo "Menunggu Java backend siap..."
          sleep 8
          curl --retry 10 --retry-delay 2 --retry-connrefused \
               http://localhost:8080/api/calculate \
               -X POST \
               -H "Content-Type: application/json" \
               -d '{"product_id":"B001","quantity":1}' \
               -o /dev/null -s -w "Java backend HTTP status: %{http_code}\n"

      # ── 8. Jalankan PHP Web Server di background (port 8000) ──────
      - name: Start PHP Web Server (port 8000)
        working-directory: frontend
        run: |
          php -S localhost:8000 &
          echo "Menunggu PHP server siap..."
          sleep 3
          curl --retry 5 --retry-delay 1 --retry-connrefused \
               http://localhost:8000 \
               -o /dev/null -s -w "PHP server HTTP status: %{http_code}\n"

      # ── 9. Jalankan semua test JUnit (Unit + Integration + System) ─
      - name: Run All Tests via Maven (JUnit + JaCoCo)
        working-directory: backend
        run: mvn test -B

      # ── 10. Jalankan PHP Unit Test ─────────────────────────────────
      - name: Run PHP Unit Tests
        working-directory: frontend
        run: php BookStoreCurlTest.php

      # ── 11. Cek JaCoCo Coverage >= 75% ────────────────────────────
      - name: Check Code Coverage (min 75%)
        working-directory: backend
        run: python3 scripts/check_coverage.py target/site/jacoco/jacoco.csv 10

      # ── 12. Upload Laporan JaCoCo ──────────────────────────────────
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 30

      # ── 13. Upload Surefire Test Reports ──────────────────────────
      - name: Upload Surefire Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-reports
          path: backend/target/surefire-reports/
          retention-days: 30
